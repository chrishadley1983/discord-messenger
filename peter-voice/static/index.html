<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#5865F2">
    <link rel="manifest" href="/static/manifest.json">
    <title>Peter Voice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Status bar */
        #status-bar {
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
            color: #99aab5;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }
        #status-bar .state {
            font-weight: 600;
            color: #5865F2;
        }

        /* Chat log */
        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: #5865F2;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            align-self: flex-start;
            background: #2d3748;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .msg .meta {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
        }

        /* Talk button area */
        #button-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        #talk-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #5865F2;
            background: #1a1a2e;
            color: #5865F2;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        #talk-btn:active, #talk-btn.recording {
            background: #ED4245;
            border-color: #ED4245;
            color: white;
            transform: scale(1.08);
        }
        #talk-btn.processing {
            background: #FEE75C;
            border-color: #FEE75C;
            color: #1a1a2e;
            animation: pulse 1s infinite;
        }
        #talk-btn.speaking {
            background: #57F287;
            border-color: #57F287;
            color: #1a1a2e;
        }
        #talk-btn.error {
            background: #ED4245;
            border-color: #ED4245;
            color: white;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        #transcript {
            font-size: 13px;
            color: #99aab5;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div id="status-bar">
        Peter Voice <span class="state" id="state-text">Ready</span>
    </div>

    <div id="chat-log"></div>

    <div id="button-area">
        <div id="transcript"></div>
        <button id="talk-btn">HOLD<br>TO TALK</button>
    </div>

    <script>
    const btn = document.getElementById('talk-btn');
    const stateText = document.getElementById('state-text');
    const transcript = document.getElementById('transcript');
    const chatLog = document.getElementById('chat-log');

    let recognition = null;
    let isRecording = false;
    let lastMessageId = null;
    let pollTimer = null;
    let pollInterval = 5000; // idle
    let activeUntil = 0;
    let bestTranscript = '';

    // ---- Speech Recognition Setup ----
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        stateText.textContent = 'Speech API not supported';
        btn.disabled = true;
    }

    function createRecognition() {
        const r = new SpeechRecognition();
        r.lang = 'en-GB';
        r.interimResults = true;
        r.continuous = false;
        r.maxAlternatives = 1;

        r.onresult = (e) => {
            const result = e.results[e.results.length - 1];
            bestTranscript = result[0].transcript.trim();
            transcript.textContent = bestTranscript;
        };

        r.onerror = (e) => {
            console.warn('Speech error:', e.error);
        };

        r.onend = () => {};  // handled by stopRecording

        return r;
    }

    // ---- State Management ----
    function setState(state, detail) {
        btn.className = '';
        switch (state) {
            case 'ready':
                stateText.textContent = 'Ready';
                btn.textContent = 'HOLD\nTO TALK';
                break;
            case 'recording':
                btn.classList.add('recording');
                stateText.textContent = 'Listening...';
                btn.textContent = 'LISTENING';
                break;
            case 'processing':
                btn.classList.add('processing');
                stateText.textContent = 'Processing...';
                btn.textContent = 'WAIT';
                break;
            case 'speaking':
                btn.classList.add('speaking');
                stateText.textContent = 'Peter speaking...';
                btn.textContent = 'SPEAKING';
                break;
            case 'error':
                btn.classList.add('error');
                stateText.textContent = detail || 'Error';
                btn.textContent = 'ERROR';
                break;
        }
    }

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = text;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    // ---- Recording ----
    function startRecording() {
        if (isRecording) return;
        isRecording = true;
        bestTranscript = '';
        transcript.textContent = '';
        recognition = createRecognition();
        recognition.start();
        setState('recording');
    }

    function stopRecording() {
        if (!isRecording) return;
        isRecording = false;

        // Stop recognition (may already be stopped if continuous=false)
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
        }

        // Send whatever text we have
        const text = bestTranscript.trim();
        bestTranscript = '';
        if (text) {
            sendMessage(text);
        } else {
            setState('ready');
        }
    }

    // ---- Send to Peter ----
    async function sendMessage(text) {
        setState('processing');
        addMessage(text, 'user');
        transcript.textContent = '';

        try {
            const resp = await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text }),
            });
            if (!resp.ok) throw new Error('Send failed');

            // Switch to active polling
            activeUntil = Date.now() + 60000;
            startPolling(2000);
        } catch (e) {
            setState('error', 'Send failed');
            setTimeout(() => setState('ready'), 2000);
        }
    }

    // ---- Polling for Replies ----
    function startPolling(interval) {
        if (pollTimer) clearInterval(pollTimer);
        pollInterval = interval;
        pollTimer = setInterval(pollMessages, pollInterval);
    }

    async function pollMessages() {
        // Switch to idle if active period expired
        if (Date.now() > activeUntil && pollInterval < 5000) {
            startPolling(5000);
            setState('ready');
            return;
        }

        try {
            let url = '/api/messages';
            if (lastMessageId) url += '?after=' + lastMessageId;

            const resp = await fetch(url);
            if (resp.status === 429) return; // rate limited, skip
            if (!resp.ok) return;

            const data = await resp.json();
            if (data.messages && data.messages.length > 0) {
                for (const msg of data.messages) {
                    lastMessageId = msg.id;
                    addMessage(msg.content, 'bot');
                    // Only TTS if we're actively waiting for a reply
                    if (Date.now() < activeUntil) {
                        await speakReply(msg.content);
                    }
                }
            }
        } catch (e) {
            console.warn('Poll error:', e);
        }
    }

    // ---- TTS Playback ----
    async function speakReply(text) {
        setState('speaking');
        try {
            const resp = await fetch('/api/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text }),
            });
            if (!resp.ok) throw new Error('TTS failed');

            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);

            await new Promise((resolve, reject) => {
                audio.onended = resolve;
                audio.onerror = reject;
                audio.play().catch(reject);
            });

            URL.revokeObjectURL(url);
        } catch (e) {
            console.warn('TTS error:', e);
        }
        setState('ready');
        activeUntil = 0; // Done waiting
    }

    // ---- Touch / Mouse Events ----
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startRecording();
    });
    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopRecording();
    });
    btn.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        stopRecording();
    });
    btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        startRecording();
    });
    btn.addEventListener('mouseup', (e) => {
        e.preventDefault();
        stopRecording();
    });

    // Prevent context menu on long press
    btn.addEventListener('contextmenu', (e) => e.preventDefault());

    // ---- Init ----
    // Seed lastMessageId so we don't speak old messages
    (async () => {
        try {
            const resp = await fetch('/api/messages');
            const data = await resp.json();
            if (data.messages && data.messages.length > 0) {
                lastMessageId = data.messages[data.messages.length - 1].id;
            }
        } catch (e) {}
        // Start idle polling
        startPolling(5000);
    })();
    </script>
</body>
</html>
