<!DOCTYPE html>
<html>
<head>
  <title>FB Group Sniper — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #16213e;
      border-radius: 16px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 6px;
      color: #fff;
    }
    .subtitle {
      color: #7f8c9b;
      font-size: 13px;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #a0aec0;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      background: #0f3460;
      border: 1px solid #1a4a7a;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #5865f2; }
    input::placeholder { color: #4a5568; }
    .row {
      display: flex;
      gap: 16px;
    }
    .row > div { flex: 1; }
    .keywords-help {
      color: #7f8c9b;
      font-size: 12px;
      margin-top: -14px;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4752c4; }
    .status {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
      transition: opacity 0.3s;
    }
    .status.success { color: #48bb78; }
    .status.error { color: #fc8181; }
    .test-btn {
      background: transparent;
      border: 1px solid #5865f2;
      color: #5865f2;
      margin-top: 10px;
      padding: 10px;
      font-size: 13px;
    }
    .test-btn:hover { background: rgba(88,101,242,0.1); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧱 FB Group Sniper</h1>
    <p class="subtitle">Get Discord pings when new posts appear in your Facebook group.</p>

    <label>Discord Webhook URL</label>
    <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." />

    <label>Keyword Filter (optional)</label>
    <input type="text" id="keywords" placeholder="e.g. modular, UCS, creator expert, 10294" />
    <p class="keywords-help">Comma-separated. Leave blank to get ALL posts. Case-insensitive.</p>

    <div class="row">
      <div>
        <label>Poll Interval (seconds)</label>
        <input type="number" id="interval" value="45" min="15" max="300" />
      </div>
      <div>
        <label>Page Refresh (minutes)</label>
        <input type="number" id="refreshMinutes" value="7" min="2" max="30" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Max Posts per Alert</label>
        <input type="number" id="maxPosts" value="5" min="1" max="20" />
      </div>
      <div></div>
    </div>

    <button id="saveBtn">Save Settings</button>
    <button class="test-btn" id="testBtn">Send Test Message to Discord</button>
    <p class="status" id="status"></p>
  </div>

  <script src="options.js"></script>
</body>
</html>
