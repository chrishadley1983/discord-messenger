<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Reset Cut</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
:root{
  --bg:#0b0f14; --bg2:#121823; --card:#161e2b; --card2:#1c2536; --line:#243144;
  --ink:#e8eef6; --muted:#8aa0b8; --dim:#5f7a96;
  --accent:#3ddc97; --accent2:#36b3ff; --warn:#ffc857; --bad:#ff6b6b; --good:#3ddc97;
  --ring:#243144;
  --shadow:0 8px 30px rgba(0,0,0,.35);
  --r:16px;
  font-synthesis:none;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:radial-gradient(1200px 700px at 70% -10%,#16243a 0,var(--bg) 55%) fixed;color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--accent2)}
.wrap{max-width:1040px;margin:0 auto;padding:18px 16px 80px}
.hidden{display:none!important}

/* Passcode gate */
#gate{position:fixed;inset:0;background:radial-gradient(900px 500px at 50% 0,#16243a,#0b0f14 60%);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}
.gatebox{width:100%;max-width:360px;text-align:center}
.gatebox .logo{font-size:34px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.gatebox p{color:var(--muted);margin:0 0 22px;font-size:14px}
.gatebox input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--line);background:#0e141d;color:var(--ink);font-size:16px;text-align:center;letter-spacing:2px}
.gatebox input:focus{outline:none;border-color:var(--accent2)}
.gatebox button{margin-top:12px;width:100%;padding:13px;border:0;border-radius:12px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#04130d;font-weight:700;font-size:15px;cursor:pointer}
.gateerr{color:var(--bad);font-size:13px;height:18px;margin-top:10px}

/* Header */
header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.title{font-size:20px;font-weight:800;letter-spacing:-.3px}
.title .sub{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
.stamp{font-size:11px;color:var(--dim);text-align:right;white-space:nowrap}
.refreshbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--accent);font-size:18px;cursor:pointer;flex:0 0 auto;line-height:1}
.refreshbtn:hover{border-color:var(--accent)}
.refreshbtn.spin{animation:spin 1s linear infinite;color:var(--accent2)}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(60px);max-width:90%;background:#0e141d;border:1px solid var(--line);color:var(--ink);padding:12px 16px;border-radius:12px;font-size:13px;box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:60;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:0}
.tab{flex:0 0 auto;padding:9px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tab.active{background:linear-gradient(90deg,rgba(61,220,151,.18),rgba(54,179,255,.18));color:var(--ink);border-color:#2f4a63}
.panel{display:none;animation:fade .25s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Cards */
.card{background:linear-gradient(180deg,var(--card),#131a26);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:720px){.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.g2,.g3{grid-template-columns:1fr}}

/* Hero */
.hero{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.ring{--p:0;width:132px;height:132px;border-radius:50%;flex:0 0 auto;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--ring) 0);display:flex;align-items:center;justify-content:center}
.ring .inner{width:108px;height:108px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .pct{font-size:26px;font-weight:800}
.ring .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.heronums{flex:1;min-width:200px}
.heronums .big{font-size:32px;font-weight:800;letter-spacing:-1px}
.heronums .big small{font-size:15px;color:var(--muted);font-weight:600}
.heronums .row{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
.heronums .row div{font-size:13px;color:var(--muted)}
.heronums .row b{color:var(--ink);font-size:15px;display:block}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-top:8px}
.pill.good{background:rgba(61,220,151,.15);color:var(--good)}
.pill.warn{background:rgba(255,200,87,.15);color:var(--warn)}
.pill.bad{background:rgba(255,107,107,.15);color:var(--bad)}

/* Metric cards */
.metric{position:relative}
.metric .k{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.metric .v{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
.metric .s{font-size:12.5px;color:var(--muted);margin-top:4px}
.metric .dot{position:absolute;top:18px;right:18px;width:10px;height:10px;border-radius:50%}
.dot.good{background:var(--good)}.dot.warn{background:var(--warn)}.dot.bad{background:var(--bad)}.dot.neutral{background:var(--dim)}

h2.sec{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:22px 4px 10px}
.summary{font-size:15.5px;line-height:1.6}
.summary .by{display:block;margin-top:12px;font-size:12px;color:var(--dim)}

/* Trends */
.chartcard h3{margin:0 0 4px;font-size:14px}
.chartcard .delta{font-size:12px;color:var(--muted);margin-bottom:8px}
canvas{width:100%!important;height:160px!important}

/* Plan */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
@media(max-width:600px){.week{grid-template-columns:repeat(4,1fr)}}
.day{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center;font-size:12px}
.day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.day .dn{font-weight:700;color:var(--muted)}
.day .dl{margin-top:6px;font-size:11px;line-height:1.3}
.day.rest{opacity:.6}
.session{margin-top:6px}
.ex{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:8px}
.ex .exn{font-weight:700;font-size:14.5px}
.ex .exd{font-size:12.5px;color:var(--muted);margin-top:2px}
.ex .exc{font-size:12px;color:var(--dim);margin-top:3px;font-style:italic}
.watch{flex:0 0 auto;padding:8px 12px;border-radius:10px;border:1px solid #2f4a63; background:rgba(54,179,255,.12);color:var(--accent2);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap}
.vidwrap{position:relative;padding-bottom:56.25%;height:0;margin:6px 0 12px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.vidwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

/* Rationale */
.rationale p{line-height:1.65;color:#d4deea;font-size:15px}
.rules li{margin-bottom:8px;line-height:1.5}
.tgt{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.tgt b{color:var(--accent)}
.foot{text-align:center;color:var(--dim);font-size:11px;margin-top:26px;line-height:1.6}
.disc{background:rgba(255,200,87,.08);border:1px solid rgba(255,200,87,.25);border-radius:12px;padding:12px 14px;font-size:12.5px;color:#d8c89a;margin-top:14px}
</style>
</head>
<body>

<div id="gate">
  <div class="gatebox">
    <div class="logo">Reset Cut</div>
    <p>Private dashboard. Enter passcode.</p>
    <form id="gform" autocomplete="off">
      <input id="pc" type="password" inputmode="text" placeholder="passcode" autofocus>
      <button type="submit" id="gbtn">Unlock</button>
      <div class="gateerr" id="gerr"></div>
    </form>
  </div>
</div>

<div class="wrap hidden" id="app">
  <header class="top">
    <div class="title">Reset Cut <span class="sub">75 kg &amp; 15% body fat by 23 Oct</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="refresh" class="refreshbtn" title="Refresh from Garmin / Withings / Peter">&#8635;</button>
      <div class="stamp" id="stamp"></div>
    </div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
  <div class="foot">Static snapshot · regenerated daily · data baked in at build time<br>Built with the local AI coach via your channels.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
// ---- Encrypted payload (AES-GCM, key = PBKDF2(passcode)) ----
const ENC = {
  payload: "__PAYLOAD__",
  salt: "__SALT__",
  iv: "__IV__",
  iters: __ITERS__
};
const GENERATED_AT = "__GENERATED_AT__";

function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}

async function decrypt(passcode){
  const enc=new TextEncoder();
  const keyMat=await crypto.subtle.importKey("raw",enc.encode(passcode),{name:"PBKDF2"},false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64ToBytes(ENC.salt),iterations:ENC.iters,hash:"SHA-256"},
    keyMat,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(ENC.iv)},key,b64ToBytes(ENC.payload));
  return JSON.parse(new TextDecoder().decode(pt));
}

const $=(s,el=document)=>el.querySelector(s);
const ce=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

let DATA=null, charts=[];

document.getElementById("gform").addEventListener("submit",async e=>{
  e.preventDefault();
  const err=$("#gerr"); err.textContent="";
  const btn=$("#gbtn"); btn.textContent="Unlocking…"; btn.disabled=true;
  try{
    DATA=await decrypt($("#pc").value.trim());
    sessionStorage.setItem("rc_pc",$("#pc").value.trim());
    $("#gate").classList.add("hidden");
    $("#app").classList.remove("hidden");
    render();
  }catch(_){
    err.textContent="Incorrect passcode";
    btn.textContent="Unlock"; btn.disabled=false;
  }
});

// auto-unlock within session
(async()=>{const saved=sessionStorage.getItem("rc_pc");if(saved){try{DATA=await decrypt(saved);$("#gate").classList.add("hidden");$("#app").classList.remove("hidden");render();}catch(_){}}})();

const TABS=[
  ["overview","Overview"],["summary","Coach"],["trends","Trends"],
  ["plan","Plan"],["mobility","Mobility"],["exercises","Exercises"],["why","Targets & Why"]
];

function render(){
  $("#stamp").innerHTML="Updated<br>"+esc(DATA.generated_at);
  const tabs=$("#tabs"); tabs.innerHTML=""; const panels=$("#panels"); panels.innerHTML="";
  TABS.forEach(([id,label],i)=>{
    const t=ce("div","tab"+(i===0?" active":""),esc(label)); t.dataset.t=id; tabs.appendChild(t);
    const p=ce("div","panel"+(i===0?" active":"")); p.id="p-"+id; panels.appendChild(p);
  });
  tabs.addEventListener("click",e=>{const t=e.target.closest(".tab");if(!t)return;
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    t.classList.add("active"); $("#p-"+t.dataset.t).classList.add("active");
    if(t.dataset.t==="trends") drawCharts();
  });
  renderOverview(); renderSummary(); renderPlan(); renderMobility(); renderExercises(); renderWhy();
  // trends drawn on first open (canvas needs to be visible)
}

function renderMobility(){
  const p=$("#p-mobility"); if(!p) return; p.innerHTML="";
  const m=DATA.mobility; if(!m){p.innerHTML='<div class="card">No mobility routine.</div>';return;}
  const head=ce("div","card");
  head.innerHTML='<h3 style="margin:0 0 2px">Today · '+esc(m.name)+'</h3>'+
    '<div style="color:var(--muted);font-size:13px;margin-bottom:6px">~'+esc(m.total_min)+' min · once through, breathe into each. No bouncing.</div>';
  p.appendChild(head);
  (m.moves||[]).forEach(mv=>head.appendChild(exRow(mv)));
  const rot=ce("div","card"); rot.style.marginTop="12px";
  rot.innerHTML='<h3 style="margin:0 0 8px">The rotation · 10 min daily</h3>'+
    (m.rotation||[]).map((r,i)=>'<div class="tgt"><span>'+esc(r)+'</span><b>'+(i===m.rotation_today?'Today':'')+'</b></div>').join("");
  p.appendChild(rot);
}

function renderOverview(){
  const h=DATA.hero, p=$("#p-overview"); p.innerHTML="";
  const card=ce("div","card");
  const hero=ce("div","hero");
  const pillClass=h.on_track==="ahead"?"good":h.on_track==="behind"?"bad":h.on_track==="on track"?"good":"warn";
  hero.innerHTML=
    '<div class="ring" style="--p:'+(h.progress_pct||0)+'"><div class="inner"><div class="pct">'+Math.round(h.progress_pct||0)+'%</div><div class="lbl">to goal</div></div></div>'+
    '<div class="heronums">'+
      '<div class="big">'+esc(h.current_weight)+'<small> kg</small></div>'+
      '<span class="pill '+pillClass+'">'+esc(h.on_track_label)+'</span>'+
      '<div class="row">'+
        '<div>Target<b>'+esc(h.target_weight)+' kg</b></div>'+
        '<div>This week<b>'+esc(h.target_this_week)+' kg</b></div>'+
        '<div>Lost<b>'+esc(h.cumulative_loss)+' kg</b></div>'+
        '<div>Trend<b>'+esc(h.slope)+' kg/wk</b></div>'+
        '<div>Week<b>'+esc(h.week_no)+' / '+esc(h.duration_weeks)+'</b></div>'+
        '<div>Days left<b>'+esc(h.days_remaining)+'</b></div>'+
      '</div></div>';
  card.appendChild(hero); p.appendChild(card);
  p.appendChild(ce("h2","sec","Key metrics"));
  const grid=ce("div","grid g3");
  (DATA.metrics||[]).forEach(m=>{
    const c=ce("div","card metric");
    c.innerHTML='<div class="dot '+esc(m.status)+'"></div><div class="k">'+esc(m.label)+'</div><div class="v">'+esc(m.value)+'</div><div class="s">'+esc(m.sub)+'</div>';
    grid.appendChild(c);
  });
  p.appendChild(grid);
}

function renderSummary(){
  const p=$("#p-summary");
  const c=ce("div","card summary");
  c.innerHTML=esc(DATA.summary).replace(/\n/g,"<br>")+'<span class="by">— Pete, your AI coach · generated locally</span>';
  p.innerHTML=""; p.appendChild(c);
}

function chartCard(title,delta){const c=ce("div","card chartcard");c.innerHTML='<h3>'+esc(title)+'</h3><div class="delta">'+esc(delta)+'</div>';const cv=ce("canvas");c.appendChild(cv);return [c,cv];}
function drawCharts(){
  charts.forEach(c=>c.destroy()); charts=[];
  const p=$("#p-trends"); p.innerHTML="";
  const grid=ce("div","grid g2"); p.appendChild(grid);
  const series=DATA.trends.series, sum=DATA.trends.summary;
  const defs=[["weight","Weight (kg)","#3ddc97"],["steps","Steps","#36b3ff"],["sleep_score","Sleep score","#b388ff"],["hrv","HRV (ms)","#ffc857"],["resting_hr","Resting HR","#ff8fa3"],["stress","Stress","#7ee0d6"]];
  defs.forEach(([k,label,col])=>{
    const pts=series[k]||[]; if(!pts.length) return;
    const s=sum[k]||{}; const d=s.delta_pct==null?"":(s.delta_pct>0?"▲ ":"▼ ")+Math.abs(s.delta_pct)+"% vs prior 14d";
    const [card,cv]=chartCard(label,d); grid.appendChild(card);
    const ch=new Chart(cv,{type:"line",data:{labels:pts.map(x=>x.date.slice(5)),datasets:[{data:pts.map(x=>x.value),borderColor:col,backgroundColor:col+"22",fill:true,tension:.35,pointRadius:0,borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:"#5f7a96",maxTicksLimit:6,font:{size:10}}},y:{grid:{color:"#1c2536"},ticks:{color:"#5f7a96",font:{size:10}}}}}});
    charts.push(ch);
  });
}

function renderPlan(){
  const p=$("#p-plan"); p.innerHTML="";
  const pl=DATA.plan;
  const week=ce("div","week");
  pl.days.forEach((d,i)=>{
    const cell=ce("div","day"+(i===pl.today_index?" today":"")+(d.is_rest?" rest":""));
    cell.innerHTML='<div class="dn">'+esc(d.name)+'</div><div class="dl">'+esc(d.short)+'</div>';
    week.appendChild(cell);
  });
  p.appendChild(week);
  const today=pl.days[pl.today_index];
  const card=ce("div","card");
  card.innerHTML='<h3 style="margin:0 0 2px">Today · '+esc(today.name)+'</h3><div style="color:var(--muted);font-size:13px;margin-bottom:6px">'+esc(today.label)+(today.note?' — '+esc(today.note):'')+'</div>';
  p.appendChild(card);
  (today.exercises||[]).forEach(ex=>card.appendChild(exRow(ex)));
  if(!today.exercises||!today.exercises.length){card.innerHTML+='<div style="color:var(--muted);font-size:13px">'+(today.is_rest?'Rest day — 10-min mobility only if tight.':'Walk + 10-min hip mobility.')+'</div>';}
  // rest of week sessions
  p.appendChild(ce("h2","sec","The week"));
  pl.days.forEach((d,i)=>{
    if(i===pl.today_index||!d.exercises||!d.exercises.length) return;
    const c=ce("div","card"); c.style.marginBottom="10px";
    c.innerHTML='<h3 style="margin:0 0 6px">'+esc(d.name)+' · '+esc(d.label)+'</h3>';
    d.exercises.forEach(ex=>c.appendChild(exRow(ex)));
    p.appendChild(c);
  });
}

function exRow(ex){
  const row=ce("div","ex");
  const left=ce("div");
  left.innerHTML='<div class="exn">'+esc(ex.name)+'</div><div class="exd">'+esc(ex.detail)+'</div>'+(ex.cue?'<div class="exc">'+esc(ex.cue)+'</div>':'');
  row.appendChild(left);
  if(ex.video_id){
    const btn=ce("button","watch","▶ Watch");
    btn.onclick=()=>{
      if(row.nextSibling&&row.nextSibling.classList&&row.nextSibling.classList.contains("vidwrap")){row.nextSibling.remove();return;}
      const v=ce("div","vidwrap");
      v.innerHTML='<iframe loading="lazy" allow="encrypted-media" allowfullscreen src="https://www.youtube-nocookie.com/embed/'+esc(ex.video_id)+'"></iframe>';
      row.parentNode.insertBefore(v,row.nextSibling);
    };
    row.appendChild(btn);
  }
  return row;
}

function renderExercises(){
  const p=$("#p-exercises"); p.innerHTML="";
  p.appendChild(ce("div","card",'<div style="color:var(--muted);font-size:13px">Form demos for every move in your programme. Tap a card to watch.</div>'));
  const grid=ce("div","grid g2"); p.appendChild(grid);
  (DATA.exercises||[]).forEach(ex=>{
    const c=ce("div","card");
    c.innerHTML='<div class="exn" style="font-size:15px">'+esc(ex.name)+'</div><div class="exd">'+esc(ex.group||"")+'</div>'+(ex.cue?'<div class="exc">'+esc(ex.cue)+'</div>':'');
    if(ex.video_id){
      const v=ce("div","vidwrap");
      v.innerHTML='<iframe loading="lazy" allow="encrypted-media" allowfullscreen src="https://www.youtube-nocookie.com/embed/'+esc(ex.video_id)+'"></iframe>';
      c.appendChild(v);
    }
    grid.appendChild(c);
  });
}

function renderWhy(){
  const p=$("#p-why"); p.innerHTML="";
  const r=DATA.rationale;
  const t=ce("div","card");
  t.innerHTML='<h3 style="margin:0 0 8px">Daily targets</h3>';
  (r.targets||[]).forEach(x=>t.appendChild(ce("div","tgt",'<span>'+esc(x[0])+'</span><b>'+esc(x[1])+'</b>')));
  p.appendChild(t);
  const c=ce("div","card rationale"); c.style.marginTop="12px";
  c.innerHTML='<h3 style="margin:0 0 8px">The rationale</h3>'+(r.paras||[]).map(x=>'<p>'+esc(x)+'</p>').join("");
  p.appendChild(c);
  const rl=ce("div","card"); rl.style.marginTop="12px";
  rl.innerHTML='<h3 style="margin:0 0 8px">The rules</h3><ul class="rules">'+(r.rules||[]).map(x=>'<li>'+esc(x)+'</li>').join("")+'</ul>';
  p.appendChild(rl);
  if(r.disclaimer){p.appendChild(ce("div","disc",esc(r.disclaimer)));}
}

// ---- Refresh: triggers a local rebuild from Garmin/Withings/Peter. Works on the
// home network (page served over http from the API); on the public surge page the
// HTTPS->HTTP call is blocked, so it degrades to a helpful message. ----
const LOCAL_API="http://172.19.64.1:8100";
function toast(msg,ms){let t=$("#toast");if(!t){t=ce("div");t.id="toast";document.body.appendChild(t);}t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),ms||6000);}
async function doRefresh(){
  const b=$("#refresh"); if(b.classList.contains("spin"))return; b.classList.add("spin");
  toast("Refreshing from Garmin, Withings & Peter… (~1 min)",60000);
  try{
    const r=await fetch(LOCAL_API+"/fitness/dashboard/refresh",{method:"POST"});
    if(!r.ok) throw new Error("bad");
    const start=GENERATED_AT;
    for(let i=0;i<40;i++){
      await new Promise(s=>setTimeout(s,3000));
      try{
        const st=await (await fetch(LOCAL_API+"/fitness/dashboard/refresh/status")).json();
        if(st && st.generated_at && st.generated_at!==start && !st.building){toast("Updated — reloading…",4000);setTimeout(()=>location.reload(),700);return;}
      }catch(_){/* keep polling */}
    }
    toast("Still building — reload in a moment.",8000);
  }catch(_){
    toast("Live refresh runs on your home network — open http://172.19.64.1:8100/fitness/dashboard/page (this page auto-updates daily at 08:20).",10000);
  }finally{ b.classList.remove("spin"); }
}
document.getElementById("refresh").addEventListener("click",doRefresh);
</script>
